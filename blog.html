---
layout: default
---

<h1>Blog Posts</h1>

<h2>No posts yet...</h2> <!-- TODO : Remove when i write a post -->

<ul class="post-list">
  {% for post in site.posts %}
    <a href="{{ post.url }}">
    <li class="post">
      <h2>{{ post.title }}</h2>
      <summary>{{ post.excerpt | strip_html | truncatewords: 50 }}</summary>
    </li>
  </a>
  {% endfor %}

</ul>
